version: 2

sources:
  - name: raw
    schema: raw
    description: Raw daily stock data from Yahoo Finance
    tables:
      - name: stock_prices
        description: Daily OHLCV data for 10 TSX equities
        columns:
          - name: trade_date
            description: The calendar date of this trading day
          - name: ticker
            description: TSX ticker symbol e.g. RY.TO
          - name: close_price
            description: Adjusted closing price in CAD
